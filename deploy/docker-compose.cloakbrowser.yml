services:
  neko:
    build:
      context: ../apps/cloakbrowser
      dockerfile: Dockerfile
    image: local/neko-cloakbrowser:local
    container_name: neko-cloakbrowser
    restart: unless-stopped
    shm_size: 2gb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18080:8080"
      - "127.0.0.1:19222:9223"
      - "127.0.0.1:19410:8932"
      - "52000:52000/udp"
      - "52000:52000/tcp"
    environment:
      NEKO_MEMBER_PROVIDER: multiuser
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: ${NEKO_MEMBER_MULTIUSER_USER_PASSWORD:?set in env file}
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: ${NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD:?set in env file}
      NEKO_WEBRTC_UDPMUX: 52000
      NEKO_WEBRTC_ICELITE: 1
      TZ: ${TZ:-America/Los_Angeles}
      NEKO_FILE_TRANSFER_ENABLED: ${NEKO_FILE_TRANSFER_ENABLED:-true}
      NEKO_FILE_TRANSFER_PATH: ${NEKO_FILE_TRANSFER_PATH:-/home/neko/Downloads}
      CLOAKBROWSER_CDP_PORT: 9222
      CLOAKBROWSER_PROXY_PORT: 9223
      CLOAKBROWSER_WINDOW_SIZE: ${CLOAKBROWSER_WINDOW_SIZE:-1280,720}
      CLOAKBROWSER_REMOTE_DEBUGGING_ADDRESS: 127.0.0.1
      CLOAKBROWSER_STEALTH_ARGS_ENABLED: ${CLOAKBROWSER_STEALTH_ARGS_ENABLED:-true}
      CLOAKBROWSER_FINGERPRINT_PLATFORM: ${CLOAKBROWSER_FINGERPRINT_PLATFORM:-linux}
      CLOAKBROWSER_START_URL: ${CLOAKBROWSER_START_URL:-https://example.com}
      CLOAKBROWSER_EXTENSION_DIRS: ${CLOAKBROWSER_EXTENSION_DIRS:-/home/neko/Downloads/pixiv-plugin/unpacked}
      CLOAKBROWSER_PROXY_SERVER: ${CLOAKBROWSER_PROXY_SERVER:-}
      CLOAKBROWSER_PROXY_USERNAME: ${CLOAKBROWSER_PROXY_USERNAME:-}
      CLOAKBROWSER_PROXY_PASSWORD: ${CLOAKBROWSER_PROXY_PASSWORD:-}
      CLOAKBROWSER_PROXY_BYPASS_LIST: ${CLOAKBROWSER_PROXY_BYPASS_LIST:-<-loopback>}
      CLIPROXY_HOST: ${CLIPROXY_HOST:-0.0.0.0}
      CLIPROXY_PORT: ${CLIPROXY_PORT:-8932}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
      CLIPROXY_IPINFO_URL: ${CLIPROXY_IPINFO_URL:-http://ipinfo.talordata.com}
      NEKO_WEBRTC_NAT1TO1: ${NEKO_WEBRTC_NAT1TO1:-${NEKO_NAT1TO1:?set server reachable IP in deploy/.env.cloakbrowser for remote access}}
    volumes:
      - ${CLOAKBROWSER_HOST_PROFILE_DIR:?set host profile dir in deploy/.env.cloakbrowser}:/home/neko/.config/cloakbrowser
      - ${CLOAKBROWSER_HOST_DOWNLOADS_DIR:?set host downloads dir in deploy/.env.cloakbrowser}:/home/neko/Downloads
      - /etc/localtime:/etc/localtime:ro
