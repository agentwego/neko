services:
  neko-01:
    image: local/neko-cloakbrowser:local
    container_name: neko-cloakbrowser-01
    restart: unless-stopped
    shm_size: 1gb
    ports:
      - "18100:8080"
      - "127.0.0.1:19300:9223"
      - "52100:52100/udp"
    environment:
      NEKO_MEMBER_PROVIDER: noauth
      NEKO_WEBRTC_UDPMUX: 52100
      NEKO_WEBRTC_ICELITE: 1
      NEKO_FILE_TRANSFER_ENABLED: ${NEKO_FILE_TRANSFER_ENABLED:-true}
      NEKO_FILE_TRANSFER_PATH: ${NEKO_FILE_TRANSFER_PATH:-/home/neko/Downloads}
      NEKO_SCREEN: ${NEKO_SCREEN:-1280x720@30}
      TZ: ${CLOAKBROWSER_TZ_01:-${CLOAKBROWSER_TZ:-America/New_York}}
      CLOAKBROWSER_CDP_PORT: 9222
      CLOAKBROWSER_PROXY_PORT: 9223
      CLOAKBROWSER_REMOTE_DEBUGGING_ADDRESS: 127.0.0.1
      CLOAKBROWSER_PROXY_SERVER: ${CLOAKBROWSER_PROXY_SERVER_01:-${CLOAKBROWSER_PROXY_SERVER:?set in deploy/.env.cloakbrowser.multi}}
      CLOAKBROWSER_PROXY_USERNAME: ${CLOAKBROWSER_PROXY_USERNAME_01:-${CLOAKBROWSER_PROXY_USERNAME:?set in deploy/.env.cloakbrowser.multi}}
      CLOAKBROWSER_PROXY_PASSWORD: ${CLOAKBROWSER_PROXY_PASSWORD_01:-${CLOAKBROWSER_PROXY_PASSWORD:?set in deploy/.env.cloakbrowser.multi}}
      CLOAKBROWSER_PROXY_BYPASS_LIST: ${CLOAKBROWSER_PROXY_BYPASS_LIST_01:-${CLOAKBROWSER_PROXY_BYPASS_LIST:-<-loopback>}}
      CLOAKBROWSER_STEALTH_ARGS_ENABLED: ${CLOAKBROWSER_STEALTH_ARGS_ENABLED:-true}
      CLOAKBROWSER_FINGERPRINT_PLATFORM: ${CLOAKBROWSER_FINGERPRINT_PLATFORM:-linux}
      CLOAKBROWSER_START_URL: ${CLOAKBROWSER_START_URL:-https://example.com}
      CLOAKBROWSER_EXTENSION_DIRS: ${CLOAKBROWSER_EXTENSION_DIRS:-/home/neko/Downloads/pixiv-plugin/unpacked}
      NEKO_NAT1TO1: ${NEKO_NAT1TO1:?set server reachable IP in deploy/.env.cloakbrowser.multi for remote access}
    volumes:
      - ${CLOAKBROWSER_MULTI_DATA_DIR:?set in deploy/.env.cloakbrowser.multi}/profile-01:/home/neko/.config/cloakbrowser
      - ${CLOAKBROWSER_MULTI_DATA_DIR:?set in deploy/.env.cloakbrowser.multi}/downloads-01:/home/neko/Downloads
      - /etc/localtime:/etc/localtime:ro

  playwright-mcp-01:
    image: local/neko-playwright-mcp:local
    container_name: neko-playwright-mcp-01
    restart: unless-stopped
    depends_on:
      neko-01:
        condition: service_healthy
    environment:
      PLAYWRIGHT_MCP_PORT: 8931
      PLAYWRIGHT_MCP_CDP_ENDPOINT: http://neko-01:9223
      PLAYWRIGHT_MCP_STEALTH_ENABLED: ${PLAYWRIGHT_MCP_STEALTH_ENABLED:-true}
      CLIPROXY_PORT: 8932
      CLIPROXY_UPSTREAM_BASE_URL: ${CLIPROXY_UPSTREAM_BASE_URL:-${OPENAI_BASE_URL:-https://api.openai.com/v1}}
      CLIPROXY_UPSTREAM_API_KEY: ${CLIPROXY_UPSTREAM_API_KEY:-${OPENAI_API_KEY:-}}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
      CLIPROXY_PROXY_SERVER: ${CLOAKBROWSER_PROXY_SERVER_01:-${CLOAKBROWSER_PROXY_SERVER:?set in deploy/.env.cloakbrowser.multi}}
      CLIPROXY_PROXY_USERNAME: ${CLOAKBROWSER_PROXY_USERNAME_01:-${CLOAKBROWSER_PROXY_USERNAME:?set in deploy/.env.cloakbrowser.multi}}
      CLIPROXY_PROXY_PASSWORD: ${CLOAKBROWSER_PROXY_PASSWORD_01:-${CLOAKBROWSER_PROXY_PASSWORD:?set in deploy/.env.cloakbrowser.multi}}
    ports:
