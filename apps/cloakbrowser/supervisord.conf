[program:cloakbrowser]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",DISPLAY="%(ENV_DISPLAY)s",CLOAKBROWSER_PROFILE_DIR="%(ENV_CLOAKBROWSER_PROFILE_DIR)s",CLOAKBROWSER_CDP_PORT="%(ENV_CLOAKBROWSER_CDP_PORT)s",CLOAKBROWSER_PROXY_PORT="%(ENV_CLOAKBROWSER_PROXY_PORT)s",CLOAKBROWSER_WINDOW_SIZE="%(ENV_CLOAKBROWSER_WINDOW_SIZE)s",CLOAKBROWSER_REMOTE_DEBUGGING_ADDRESS="%(ENV_CLOAKBROWSER_REMOTE_DEBUGGING_ADDRESS)s",CLOAKBROWSER_EXTRA_ARGS="%(ENV_CLOAKBROWSER_EXTRA_ARGS)s",CLOAKBROWSER_START_URL="%(ENV_CLOAKBROWSER_START_URL)s",CLOAKBROWSER_BIN="%(ENV_CLOAKBROWSER_BIN)s"
command=/usr/local/bin/neko-cloakbrowser-entrypoint.sh
stopsignal=INT
autorestart=true
priority=800
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/cloakbrowser.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true

[program:cloakbrowser-cdp-proxy]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",CLOAKBROWSER_CDP_PORT="%(ENV_CLOAKBROWSER_CDP_PORT)s",CLOAKBROWSER_PROXY_PORT="%(ENV_CLOAKBROWSER_PROXY_PORT)s"
command=/usr/bin/python3 /usr/local/bin/neko-cloakbrowser-cdp-proxy.py
autorestart=true
priority=805
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/cloakbrowser-cdp-proxy.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true

[program:openbox]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",DISPLAY="%(ENV_DISPLAY)s"
command=/usr/bin/openbox --config-file /etc/neko/openbox.xml
autorestart=true
priority=300
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/openbox.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true
