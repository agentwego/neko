version: '3'

vars:
  APP_NAME: neko-cloakbrowser
  BASE_IMAGE_NAME: local/neko-cloakbrowser-base:local
  IMAGE_NAME: local/neko-cloakbrowser:local
  CONTAINER_NAME: neko-cloakbrowser
  COMPOSE_FILE: deploy/docker-compose.cloakbrowser.yml
  SYSTEMD_UNIT_DIR: /etc/systemd/system
  SYSTEMD_SERVICE: neko-cloakbrowser.service
  HOST_PROFILE_DIR: /home/yun/workspace/neko-data/profile
  HOST_DOWNLOADS_DIR: /home/yun/workspace/neko-data/downloads

tasks:
  image:base:
    desc: Build the long-lived CloakBrowser Neko base image with upstream browser/runtime dependencies
    cmds:
      - docker build -f apps/cloakbrowser/Dockerfile.base -t {{.BASE_IMAGE_NAME}} apps/cloakbrowser

  image:build:
    desc: Build the lightweight CloakBrowser Neko app image on top of the cached base image
    deps: [image:base]
    cmds:
      - docker build -f apps/cloakbrowser/Dockerfile --build-arg CLOAKBROWSER_BASE_IMAGE={{.BASE_IMAGE_NAME}} -t {{.IMAGE_NAME}} apps/cloakbrowser

  verify:smoke:
    desc: Run a smoke test for build, service health, CDP, browser-use, and supervisor processes
    cmds:
      - go-task image:build
      - docker compose --env-file deploy/.env.cloakbrowser -f {{.COMPOSE_FILE}} up -d --force-recreate
      - sleep 5
      - go-task service:health
      - go-task service:cdp | tee /tmp/neko-cloakbrowser-cdp.json
      - go-task service:browser-use | tee /tmp/neko-browser-use-status.txt
      - grep -q 'webSocketDebuggerUrl' /tmp/neko-cloakbrowser-cdp.json
      - grep -q 'RUNNING' /tmp/neko-browser-use-status.txt
      - docker exec {{.CONTAINER_NAME}} supervisorctl status | tee /tmp/neko-cloakbrowser-supervisor.txt
      - grep -q 'cloakbrowser-cdp-proxy[[:space:]]\+RUNNING' /tmp/neko-cloakbrowser-supervisor.txt
      - grep -q 'neko[[:space:]]\+RUNNING' /tmp/neko-cloakbrowser-supervisor.txt
      - docker inspect {{.CONTAINER_NAME}} --format '{{printf "%q" .Image}}' | tee /tmp/neko-cloakbrowser-image-id.txt
      - docker image inspect {{.IMAGE_NAME}} --format '{{printf "%q" .Id}}' | tee /tmp/neko-cloakbrowser-built-image-id.txt
      - docker inspect {{.CONTAINER_NAME}} | grep -o '"com.docker.compose.image":"[^"]*"' | tee /tmp/neko-cloakbrowser-compose-image-label.txt || true
      - test "$(cat /tmp/neko-cloakbrowser-image-id.txt)" = "$(cat /tmp/neko-cloakbrowser-built-image-id.txt)"

  image:inspect:
    desc: Show built image metadata
    cmds:
      - docker image inspect {{.IMAGE_NAME}}

  service:up:
    desc: Start the stack with docker compose
    cmds:
      - docker compose --env-file deploy/.env.cloakbrowser -f {{.COMPOSE_FILE}} up -d

  service:down:
    desc: Stop the stack
    cmds:
      - docker compose --env-file deploy/.env.cloakbrowser -f {{.COMPOSE_FILE}} down

  service:logs:
    desc: Tail service logs
    cmds:
      - docker compose --env-file deploy/.env.cloakbrowser -f {{.COMPOSE_FILE}} logs -f

  service:status:
    desc: Show service container status
    cmds:
      - docker compose --env-file deploy/.env.cloakbrowser -f {{.COMPOSE_FILE}} ps

  multi:up:
    desc: Start ten additional CloakBrowser Neko instances with in-container browser-use
    cmds:
      - docker compose --env-file deploy/.env.cloakbrowser.multi -f deploy/docker-compose.cloakbrowser.multi.yml up -d

  multi:down:
    desc: Stop ten additional CloakBrowser Neko instances
    cmds:
      - docker compose --env-file deploy/.env.cloakbrowser.multi -f deploy/docker-compose.cloakbrowser.multi.yml down

  multi:status:
    desc: Show status for the ten additional CloakBrowser Neko instances
    cmds:
      - docker compose --env-file deploy/.env.cloakbrowser.multi -f deploy/docker-compose.cloakbrowser.multi.yml ps

  multi:verify:
    desc: Verify HTTP, CDP, in-container browser-use, and fingerprints for the ten additional instances
    cmds:
      - |
        python - <<'PY'
        import subprocess
        import sys
        import urllib.request

        failures = []
        fingerprints = []
        for i in range(10):
            idx = i + 1
            http = 18100 + i
            cdp = 19300 + i
            label = f'{idx:02d}'
            try:
                if urllib.request.urlopen(f'http://127.0.0.1:{http}/health', timeout=3).read().strip() != b'true':
                    raise RuntimeError('unexpected health response')
            except Exception as exc:
                failures.append(f'neko-{label} http:{http} {exc}')
            try:
                urllib.request.urlopen(f'http://127.0.0.1:{cdp}/json/version', timeout=3).read()
            except Exception as exc:
                failures.append(f'neko-{label} cdp:{cdp} {exc}')
            try:
                status = subprocess.check_output(['docker', 'exec', f'neko-cloakbrowser-{label}', 'supervisorctl', 'status', 'browser-use'], text=True, timeout=5)
                if 'RUNNING' not in status:
                    raise RuntimeError(status.strip())
            except Exception as exc:
                failures.append(f'neko-{label} browser-use {exc}')
            try:
                cmd = [
                    'docker', 'exec', f'neko-cloakbrowser-{label}', 'python3', '-c',
                    "import pathlib\n"
                    "for p in pathlib.Path('/proc').iterdir():\n"
                    "    if not p.name.isdigit():\n"
                    "        continue\n"
                    "    try:\n"
                    "        raw = (p / 'cmdline').read_bytes()\n"
                    "    except Exception:\n"
                    "        continue\n"
                    "    if b'/opt/cloakbrowser-bin/chrome' not in raw:\n"
                    "        continue\n"
                    "    for arg in raw.split(bytes([0])):\n"
                    "        if arg.startswith(b'--fingerprint='):\n"
                    "            print(arg.decode().split('=', 1)[1])\n"
                    "            raise SystemExit(0)\n"
                    "raise SystemExit(1)\n",
                ]
                fingerprint = subprocess.check_output(cmd, text=True, timeout=3).strip()
                fingerprints.append((label, fingerprint))
            except Exception as exc:
                failures.append(f'neko-{label} fingerprint {exc}')
            if not failures or not any(f'neko-{label} ' in f for f in failures):
                print(f'neko-{label}: http:{http} OK | cdp:{cdp} OK | browser-use OK | fingerprint:{fingerprints[-1][1]}')
        duplicate_fingerprints = sorted({fp for _, fp in fingerprints if [v for _, v in fingerprints].count(fp) > 1})
        if duplicate_fingerprints:
            failures.append('duplicate fingerprints: ' + ', '.join(duplicate_fingerprints))
        if len({fp for _, fp in fingerprints}) != 10:
            failures.append(f'unique fingerprints: {len({fp for _, fp in fingerprints})}/10')
        if failures:
            print('\n'.join(failures), file=sys.stderr)
            raise SystemExit(1)
        PY

  files:ls:
    desc: List files in the shared downloads directory used by Hermes and Neko
    cmds:
      - ls -lah {{.HOST_DOWNLOADS_DIR}}

  files:container-ls:
    desc: List files from inside the container downloads directory
    cmds:
      - docker exec {{.CONTAINER_NAME}} ls -lah /home/neko/Downloads

  files:push:
    desc: 'Copy a local file into the shared downloads directory (usage: FILE=/abs/path go-task files:push)'
    requires:
      vars: [FILE]
    cmds:
      - cp {{.FILE}} {{.HOST_DOWNLOADS_DIR}}/
      - ls -lah {{.HOST_DOWNLOADS_DIR}}

  files:pull:
    desc: 'Copy a file out of the shared downloads directory (usage: NAME=file.txt DEST=/abs/path go-task files:pull)'
    requires:
      vars: [NAME, DEST]
    cmds:
      - cp {{.HOST_DOWNLOADS_DIR}}/{{.NAME}} {{.DEST}}
      - ls -lah {{.DEST}}

  service:cdp:
    desc: Query the exposed CDP endpoint
    cmds:
      - curl --http1.1 -fsS http://127.0.0.1:${CDP_PORT:-19222}/json/version

  service:browser-use:
    desc: Verify the in-container browser-use daemon managed by supervisor
    cmds:
      - docker exec {{.CONTAINER_NAME}} supervisorctl status browser-use
  service:health:
    desc: Query the exposed neko health endpoint
    cmds:
      - curl -fsS http://127.0.0.1:${HTTP_PORT:-18080}/health

  systemd:install:
    desc: Install/update the systemd unit for docker compose deployment
    cmds:
      - /usr/bin/install -Dm644 deploy/systemd/neko-cloakbrowser.service {{.SYSTEMD_UNIT_DIR}}/{{.SYSTEMD_SERVICE}}
      - /usr/bin/systemctl daemon-reload

  systemd:enable:
    desc: Enable and start the systemd service
    deps: [systemd:install]
    cmds:
      - /usr/bin/systemctl enable --now {{.SYSTEMD_SERVICE}}

  systemd:restart:
    desc: Restart the systemd service
    cmds:
      - /usr/bin/systemctl restart {{.SYSTEMD_SERVICE}}

  systemd:status:
    desc: Show systemd service status
    cmds:
      - /usr/bin/systemctl status {{.SYSTEMD_SERVICE}} --no-pager
